openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Endometriosis Triage & Management Application API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patients
    description: Patient management
  - name: assessments
    description: Symptom assessments and triage
  - name: investigations
    description: Diagnostic investigations (TVUS, MRI, laparoscopy, CA-125)
  - name: care-pathway
    description: NHS care pathway tracking and timeline
  - name: surgeries
    description: Surgical records and operative findings
  - name: management-plans
    description: Management plan generation and tracking
  - name: medications
    description: Approved medications reference
  - name: dashboard
    description: Summary and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: triageLevel
          in: query
          schema:
            type: string
        - name: pathway
          in: query
          schema:
            type: string
        - name: carePathwayState
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /patients/{id}/assessments:
    get:
      operationId: listPatientAssessments
      tags: [assessments]
      summary: List assessments for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"

  /patients/{id}/investigations:
    get:
      operationId: getPatientInvestigations
      tags: [investigations]
      summary: Get investigations for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investigations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investigation"
    put:
      operationId: updatePatientInvestigations
      tags: [investigations]
      summary: Update or create investigations for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigationInput"
      responses:
        "200":
          description: Updated investigations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investigation"

  /patients/{id}/care-pathway:
    get:
      operationId: getPatientCarePathway
      tags: [care-pathway]
      summary: Get care pathway state and timeline for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Care pathway state and events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePathway"
    post:
      operationId: addCarePathwayEvent
      tags: [care-pathway]
      summary: Add a care pathway event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarePathwayEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePathwayEvent"

  /patients/{id}/surgeries:
    get:
      operationId: listPatientSurgeries
      tags: [surgeries]
      summary: List surgeries for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of surgeries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surgery"
    post:
      operationId: createSurgery
      tags: [surgeries]
      summary: Create a surgery record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurgeryInput"
      responses:
        "201":
          description: Created surgery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgery"

  /surgeries/{id}:
    get:
      operationId: getSurgery
      tags: [surgeries]
      summary: Get a surgery record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Surgery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgery"
    patch:
      operationId: updateSurgery
      tags: [surgeries]
      summary: Update a surgery record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurgeryUpdate"
      responses:
        "200":
          description: Updated surgery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgery"

  /assessments:
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Create a new symptom assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Created assessment with triage result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get an assessment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /management-plans:
    get:
      operationId: listManagementPlans
      tags: [management-plans]
      summary: List all management plans
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: pathway
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of management plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManagementPlan"
    post:
      operationId: createManagementPlan
      tags: [management-plans]
      summary: Create a management plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagementPlanInput"
      responses:
        "201":
          description: Created management plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagementPlan"

  /management-plans/{id}:
    get:
      operationId: getManagementPlan
      tags: [management-plans]
      summary: Get a management plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Management plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagementPlan"
    patch:
      operationId: updateManagementPlan
      tags: [management-plans]
      summary: Update a management plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagementPlanUpdate"
      responses:
        "200":
          description: Updated management plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagementPlan"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List all reference medications
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: tier
          in: query
          schema:
            type: string
        - name: formularyStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"

  /medications/{id}:
    get:
      operationId: getMedication
      tags: [medications]
      summary: Get a medication by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall patient and triage summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent patient assessments and plan updates
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/triage-breakdown:
    get:
      operationId: getTriageBreakdown
      tags: [dashboard]
      summary: Get patient counts grouped by triage level, stage, and pathway
      responses:
        "200":
          description: Triage breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageBreakdown"

  /dashboard/pathway-breakdown:
    get:
      operationId: getPathwayBreakdown
      tags: [dashboard]
      summary: Get patient counts by care pathway
      responses:
        "200":
          description: Pathway breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathwayBreakdown"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Patient:
      type: object
      required: [id, firstName, lastName, dateOfBirth, carePathwayState, createdAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        currentStage:
          type: ["string", "null"]
          description: "Endometriosis stage: Stage I, II, III, IV"
        triageLevel:
          type: ["string", "null"]
          description: "urgent, high, moderate, routine"
        lastAssessmentDate:
          type: ["string", "null"]
        carePathwayState:
          type: string
          description: "referral_received, clinic_review, imaging_completed, triage_decision, medication_started, waiting_list_added, mdt_discussed, surgery_scheduled, surgery_completed, post_op_review, follow_up_ongoing, discharged, long_term_management"
        currentPathway:
          type: ["string", "null"]
          description: "medical, surgery_general, surgery_specialist, combined"
        bsgeCentre:
          type: ["string", "null"]
        referralSource:
          type: ["string", "null"]
          description: "gp, self, a_e, fertility_clinic, other"
        referralDate:
          type: ["string", "null"]
        fertilityPriority:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    PatientInput:
      type: object
      required: [firstName, lastName, dateOfBirth]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        referralSource:
          type: string
        referralDate:
          type: string
        fertilityPriority:
          type: boolean

    PatientUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        email:
          type: string
        phone:
          type: string
        currentStage:
          type: string
        triageLevel:
          type: string
        carePathwayState:
          type: string
        currentPathway:
          type: string
        bsgeCentre:
          type: string
        referralSource:
          type: string
        referralDate:
          type: string
        fertilityPriority:
          type: boolean
        notes:
          type: string

    Assessment:
      type: object
      required: [id, patientId, assessmentDate, triageLevel, triageScore, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        assessmentDate:
          type: string
        dysmenorrhea:
          type: integer
          description: Pain score 0-10
        chronicPelvicPain:
          type: integer
          description: Pain score 0-10
        dyspareunia:
          type: integer
          description: Pain score 0-10
        dyschezia:
          type: integer
          description: Pain score 0-10
        dysuria:
          type: integer
          description: Pain score 0-10
        infertilityHistory:
          type: boolean
        previousSurgery:
          type: boolean
        familyHistory:
          type: boolean
        symptomDurationMonths:
          type: integer
        impactOnQuality:
          type: integer
          description: 0-10 quality of life impact
        irregularBleeding:
          type: boolean
        bloating:
          type: boolean
        fatigue:
          type: boolean
        bowelInvolvement:
          type: boolean
        bladderInvolvement:
          type: boolean
        uretericInvolvement:
          type: boolean
        fertilityPriority:
          type: boolean
        negativeLaparoscopy:
          type: boolean
        chronicPainPredominant:
          type: boolean
        symptomsControlledOnMedication:
          type: boolean
        previousTreatmentHistory:
          type: ["string", "null"]
        suggestedStage:
          type: ["string", "null"]
        triageLevel:
          type: string
          description: "urgent, high, moderate, routine"
        triageScore:
          type: integer
        suggestedPathway:
          type: ["string", "null"]
        pathwayJustification:
          type: ["string", "null"]
        mdtRequired:
          type: boolean
        bsgeReferral:
          type: boolean
        mriRequired:
          type: boolean
        avoidGnRH:
          type: boolean
        fertilityReferral:
          type: boolean
        painClinic:
          type: boolean
        psychSupport:
          type: boolean
        clinicianNotes:
          type: ["string", "null"]
        createdAt:
          type: string

    AssessmentInput:
      type: object
      required: [patientId, assessmentDate, dysmenorrhea, chronicPelvicPain, dyspareunia, dyschezia, dysuria, infertilityHistory, previousSurgery, familyHistory, symptomDurationMonths, impactOnQuality, irregularBleeding, bloating, fatigue]
      properties:
        patientId:
          type: integer
        assessmentDate:
          type: string
        dysmenorrhea:
          type: integer
          minimum: 0
          maximum: 10
        chronicPelvicPain:
          type: integer
          minimum: 0
          maximum: 10
        dyspareunia:
          type: integer
          minimum: 0
          maximum: 10
        dyschezia:
          type: integer
          minimum: 0
          maximum: 10
        dysuria:
          type: integer
          minimum: 0
          maximum: 10
        infertilityHistory:
          type: boolean
        previousSurgery:
          type: boolean
        familyHistory:
          type: boolean
        symptomDurationMonths:
          type: integer
          minimum: 0
        impactOnQuality:
          type: integer
          minimum: 0
          maximum: 10
        irregularBleeding:
          type: boolean
        bloating:
          type: boolean
        fatigue:
          type: boolean
        bowelInvolvement:
          type: boolean
        bladderInvolvement:
          type: boolean
        uretericInvolvement:
          type: boolean
        fertilityPriority:
          type: boolean
        negativeLaparoscopy:
          type: boolean
        chronicPainPredominant:
          type: boolean
        symptomsControlledOnMedication:
          type: boolean
        previousTreatmentHistory:
          type: string
        clinicianNotes:
          type: string

    Investigation:
      type: object
      required: [id, patientId]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        tvusDate:
          type: ["string", "null"]
        tvusRequested:
          type: boolean
        tvusCompleted:
          type: boolean
        tvusFindings:
          type: ["string", "null"]
        tvusEndometrioma:
          type: boolean
        tvusEndometriomaSize:
          type: ["string", "null"]
        tvusDeepEndometriosis:
          type: boolean
        tvusDeepEndometriosisLocation:
          type: ["string", "null"]
        tvusAdenomyosis:
          type: boolean
        tvusNormal:
          type: boolean
        tvusNotes:
          type: ["string", "null"]
        mriDate:
          type: ["string", "null"]
        mriRequested:
          type: boolean
        mriCompleted:
          type: boolean
        mriFindings:
          type: ["string", "null"]
        mriDeepEndometriosis:
          type: boolean
        mriDeepEndometriosisLocation:
          type: ["string", "null"]
        mriEndometrioma:
          type: boolean
        mriEndometriomaSize:
          type: ["string", "null"]
        mriUretericInvolvement:
          type: boolean
        mriBowelInvolvement:
          type: boolean
        mriBladderInvolvement:
          type: boolean
        mriNormal:
          type: boolean
        mriNotes:
          type: ["string", "null"]
        laparoscopyDate:
          type: ["string", "null"]
        laparoscopyRequested:
          type: boolean
        laparoscopyCompleted:
          type: boolean
        laparoscopyType:
          type: ["string", "null"]
        laparoscopyFindings:
          type: ["string", "null"]
        laparoscopyRafsStage:
          type: ["string", "null"]
        laparoscopyEnzianScore:
          type: ["string", "null"]
        laparoscopyLocations:
          type: array
          items:
            type: string
        laparoscopyComplications:
          type: ["string", "null"]
        laparoscopyNotes:
          type: ["string", "null"]
        ca125Date:
          type: ["string", "null"]
        ca125Requested:
          type: boolean
        ca125Completed:
          type: boolean
        ca125Value:
          type: ["string", "null"]
        ca125Notes:
          type: ["string", "null"]
        fbcDate:
          type: ["string", "null"]
        fbcRequested:
          type: boolean
        fbcCompleted:
          type: boolean
        fbcNotes:
          type: ["string", "null"]
        requestedBy:
          type: ["string", "null"]
        reviewedBy:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    InvestigationInput:
      type: object
      properties:
        tvusDate:
          type: string
        tvusRequested:
          type: boolean
        tvusCompleted:
          type: boolean
        tvusFindings:
          type: string
        tvusEndometrioma:
          type: boolean
        tvusEndometriomaSize:
          type: string
        tvusDeepEndometriosis:
          type: boolean
        tvusDeepEndometriosisLocation:
          type: string
        tvusAdenomyosis:
          type: boolean
        tvusNormal:
          type: boolean
        tvusNotes:
          type: string
        mriDate:
          type: string
        mriRequested:
          type: boolean
        mriCompleted:
          type: boolean
        mriFindings:
          type: string
        mriDeepEndometriosis:
          type: boolean
        mriDeepEndometriosisLocation:
          type: string
        mriEndometrioma:
          type: boolean
        mriEndometriomaSize:
          type: string
        mriUretericInvolvement:
          type: boolean
        mriBowelInvolvement:
          type: boolean
        mriBladderInvolvement:
          type: boolean
        mriNormal:
          type: boolean
        mriNotes:
          type: string
        laparoscopyDate:
          type: string
        laparoscopyRequested:
          type: boolean
        laparoscopyCompleted:
          type: boolean
        laparoscopyType:
          type: string
        laparoscopyFindings:
          type: string
        laparoscopyRafsStage:
          type: string
        laparoscopyEnzianScore:
          type: string
        laparoscopyLocations:
          type: array
          items:
            type: string
        laparoscopyComplications:
          type: string
        laparoscopyNotes:
          type: string
        ca125Date:
          type: string
        ca125Requested:
          type: boolean
        ca125Completed:
          type: boolean
        ca125Value:
          type: string
        ca125Notes:
          type: string
        fbcDate:
          type: string
        fbcRequested:
          type: boolean
        fbcCompleted:
          type: boolean
        fbcNotes:
          type: string
        requestedBy:
          type: string
        reviewedBy:
          type: string

    CarePathway:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/CarePathwayState"
        events:
          type: array
          items:
            $ref: "#/components/schemas/CarePathwayEvent"

    CarePathwayState:
      type: object
      required: [id, patientId, currentState]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        currentState:
          type: string
        currentPathway:
          type: ["string", "null"]
        referralDate:
          type: ["string", "null"]
        clinicReviewDate:
          type: ["string", "null"]
        triageDecisionDate:
          type: ["string", "null"]
        medicationStartDate:
          type: ["string", "null"]
        waitingListDate:
          type: ["string", "null"]
        surgeryDate:
          type: ["string", "null"]
        postOpReviewDate:
          type: ["string", "null"]
        lastFollowUpDate:
          type: ["string", "null"]
        dischargeDate:
          type: ["string", "null"]
        nextActionDate:
          type: ["string", "null"]
        nextActionType:
          type: ["string", "null"]
        bsgeCentre:
          type: ["string", "null"]
        fertilityPriority:
          type: boolean
        fertilityClinicReferral:
          type: boolean
        painClinicReferral:
          type: boolean
        updatedAt:
          type: ["string", "null"]

    CarePathwayEvent:
      type: object
      required: [id, patientId, state, eventDate]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        state:
