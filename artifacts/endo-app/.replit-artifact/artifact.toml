kind = "web"
previewPath = "/"
title = "EndoTriage"
version = "1.0.0"
id = "artifacts/endo-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19909

[services.development]
run = "pnpm --filter @workspace/endo-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/endo-app", "run", "build" ]
publicDir = "artifacts/endo-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19909"
BASE_PATH = "/"
